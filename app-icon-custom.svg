  <path d="M174 302c66-94 160-150 280-168" stroke="#ccfbf1" stroke-width="18" stroke-linecap="round" opacity="0.2"/>
  <path d="M690 858c76-38 128-94 156-168" stroke="#fff7ed" stroke-width="16" stroke-linecap="round" opacity="0.16"/>

  <g filter="url(#shadow)">
