<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="120" y1="70" x2="900" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="0.48" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="panel" x1="230" y1="190" x2="820" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="0.58" stop-color="#fbfffe" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#e9f7f5" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="glass" x1="250" y1="215" x2="780" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
