    <rect x="205" y="195" width="614" height="634" rx="68" fill="url(#glass)" opacity="0.58"/>
    <rect x="188" y="178" width="648" height="668" rx="82" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="4"/>
  </g>

  <g transform="translate(246 244)">
